<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#5E5D3F" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Chytrý dům na vsi</title>
    <meta name="description" content="Záznamník nápadů, otázek a rozhodnutí pro stavbu domu." />
    <!-- FOUC prevention: apply stored theme before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme-preference") || "system";
          if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
          else if (t === "light") document.documentElement.setAttribute("data-theme", "light");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
