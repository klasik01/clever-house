name: Deploy · Netlify (production / OPE)

# Manual production deploy to Netlify. Only dispatches from `main` —
# production is serious business, keep the guard.
# On successful deploy this workflow tags the commit v{version} and pushes
# the tag to origin (version comes from app/package.json).
on:
  workflow_dispatch:

permissions:
  # contents:write is required so the tag-version step can push a git tag
  # back to the repo after a successful deploy.
  contents: write

concurrency:
  group: deploy-netlify-prod
  cancel-in-progress: false

jobs:
  guard:
    name: Guard (main only)
    runs-on: ubuntu-latest
    steps:
      - name: Refuse if not on main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Production Netlify deploy can only be dispatched from the 'main' branch (current: ${{ github.ref }})"
            exit 1
          fi

  deploy:
    name: Build + Netlify deploy + tag
    needs: guard
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.netlify.outputs.deploy-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history + tags so the tag-version step can detect
          # whether v{version} already exists (on HEAD or elsewhere).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        working-directory: ./app
        run: npm ci

      - name: Type-check
        working-directory: ./app
        run: npm run typecheck

      - name: Lint
        working-directory: ./app
        run: npm run lint

      - name: Run unit tests
        working-directory: ./app
        run: npm test

      - name: Read version
        id: ver
        run: |
          VERSION=$(node -p "require('./app/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Deploying app/package.json version: v${VERSION}"

      - name: Preflight — refuse if tag already exists at a different commit
        # Tags are our immutable "this version shipped at this sha" marker.
        # If the tag already points to HEAD, we treat the deploy as a redeploy
        # (idempotent). If it points elsewhere, someone forgot to bump the
        # package.json version — fail loud so we don't produce stale tags.
        run: |
          git fetch --tags --force
          TAG="${{ steps.ver.outputs.tag }}"
          EXISTING=$(git rev-list -n 1 "${TAG}" 2>/dev/null || true)
          if [ -z "${EXISTING}" ]; then
            echo "Tag ${TAG} not present — will create after deploy."
            exit 0
          fi
          if [ "${EXISTING}" = "${{ github.sha }}" ]; then
            echo "Tag ${TAG} already points at this commit — redeploy, nothing to tag."
            exit 0
          fi
          echo "::error::Tag ${TAG} already exists at ${EXISTING} but deploy is ${{ github.sha }}. Bump app/package.json version before redeploying."
          exit 1

      - name: Build
        working-directory: ./app
        run: npm run build
        env:
          # Netlify hosts the app at the domain root — no base path.
          VITE_BASE_PATH: /
          VITE_FIREBASE_API_KEY: ${{ secrets.OPE_VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.OPE_VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.OPE_VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.OPE_VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.OPE_VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.OPE_VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.OPE_VITE_FIREBASE_VAPID_KEY }}

      - name: Deploy to Netlify (production)
        id: netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: app/dist
          production-deploy: true
          deploy-message: "Deploy ${{ steps.ver.outputs.tag }} (${{ github.sha }}) from ${{ github.ref_name }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          github-deployment-environment: production
          fails-without-credentials: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Create + push version tag
        # Only if Netlify deploy succeeded. Creates an annotated tag
        # v{version} on this commit and pushes it to origin. Idempotent:
        # if the tag already points here (e.g. rerun), it does nothing.
        if: success()
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          EXISTING=$(git rev-list -n 1 "${TAG}" 2>/dev/null || true)
          if [ "${EXISTING}" = "${{ github.sha }}" ]; then
            echo "Tag ${TAG} already at HEAD — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Deploy ${TAG} to Netlify (OPE) — ${{ github.sha }}"
          git push origin "${TAG}"
          echo "Pushed ${TAG} → origin."
