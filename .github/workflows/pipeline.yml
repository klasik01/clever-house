# ============================================================================
# Chytrý dům — orchestrated CI/CD pipeline
# ============================================================================
#
# Single workflow that stitches every stage together. Runs on push to any
# branch + PRs to main/develop. Deploy stages are gated by GitHub
# Environments, so they pause waiting for manual "Review deployments"
# approval in the Actions UI — that's the click-to-deploy gesture you'd
# get from a GitLab pipeline.
#
# Stages (jobs flow left-to-right):
#
#   install ──► lint ───────────┬─► build-frontend-dev ──► deploy-dev-frontend
#           ├─► test-app ───────┤
#           ├─► typecheck-app ──┼─► build-frontend-prod ─► deploy-prod-frontend
#           ├─► test-fn ────────┤
#           └─► typecheck-fn ───┴─► build-functions ──┬─► deploy-dev-functions
#                                                    └─► deploy-prod-functions
#                                                 ╭──► deploy-dev-rules
#                                                 └──► deploy-prod-rules
#
# Branch rules:
#   main       → full pipeline (install → validate → build → deploy dev &
#                 prod, both manual via env approval).
#   develop    → install → validate → build → deploy dev only.
#   everything → install → validate → build. No deploys.
#
# Secrets (reused from existing GitHub secrets):
#   Dev:
#     FIREBASE_PROJECT_ID, FIREBASE_SERVICE_ACCOUNT,
#     VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN,
#     VITE_FIREBASE_PROJECT_ID, VITE_FIREBASE_STORAGE_BUCKET,
#     VITE_FIREBASE_MESSAGING_SENDER_ID, VITE_FIREBASE_APP_ID,
#     VITE_FIREBASE_VAPID_KEY
#   Prod (OPE_* prefix):
#     OPE_FIREBASE_PROJECT_ID, OPE_FIREBASE_SERVICE_ACCOUNT,
#     OPE_VITE_FIREBASE_* (all the same keys, OPE-prefixed),
#     OPE_VITE_FIREBASE_VAPID_KEY,
#     NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID
#
# Environments to create in Settings → Environments (assign yourself as
# Required reviewer on each so deploys pause for manual approval):
#   dev-frontend, dev-functions, dev-rules,
#   prod-frontend, prod-functions, prod-rules
# ============================================================================

name: Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write   # needed by deploy-prod-frontend to push the version tag
  pages: write
  id-token: write

concurrency:
  # Cancel older runs on the same ref when a new commit lands. Production
  # deploys are gated by manual approval anyway, so a cancelled older run
  # just saves CI minutes — no safety risk.
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.15.0"
  FUNCTIONS_NODE_VERSION: "20"

jobs:
  # ==========================================================================
  # STAGE 1 — install
  # Primes the npm download cache. Subsequent jobs re-run `npm ci` but hit
  # the cache and finish in seconds.
  # ==========================================================================
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            app/package-lock.json
            app/functions/package-lock.json
      - name: npm ci (app)
        working-directory: ./app
        run: npm ci
      - name: npm ci (functions)
        working-directory: ./app/functions
        run: npm ci

  # ==========================================================================
  # STAGE 2 — validate (parallel)
  # ==========================================================================
  lint:
    name: validate · lint (app)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: npm ci (app)
        working-directory: ./app
        run: npm ci
      - name: Lint
        working-directory: ./app
        run: npm run lint

  test-app:
    name: validate · test (app)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: npm ci (app)
        working-directory: ./app
        run: npm ci
      - name: Test
        working-directory: ./app
        run: npm test

  typecheck-app:
    name: validate · typecheck (app)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: npm ci (app)
        working-directory: ./app
        run: npm ci
      - name: Typecheck
        working-directory: ./app
        run: npm run typecheck

  test-functions:
    name: validate · test (functions)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FUNCTIONS_NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/functions/package-lock.json
      - name: npm ci (functions)
        working-directory: ./app/functions
        run: npm ci
      - name: Test
        working-directory: ./app/functions
        run: npm test

  typecheck-functions:
    name: validate · typecheck (functions)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FUNCTIONS_NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/functions/package-lock.json
      - name: npm ci (functions)
        working-directory: ./app/functions
        run: npm ci
      - name: Typecheck
        working-directory: ./app/functions
        run: npm run typecheck

  # ==========================================================================
  # STAGE 3 — build
  # ==========================================================================
  # Frontend builds are per-environment (Vite bakes env vars into the bundle),
  # so we can't "build once". Functions build is identical across envs — one
  # build, multiple deploys.
  # ==========================================================================

  build-frontend-dev:
    name: build · frontend (dev)
    runs-on: ubuntu-latest
    needs: [lint, test-app, typecheck-app]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: npm ci
        working-directory: ./app
        run: npm ci
      - name: Build
        working-directory: ./app
        run: npm run build
        env:
          VITE_BASE_PATH: /clever-house/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dev
          path: app/dist
          retention-days: 7

  build-frontend-prod:
    name: build · frontend (prod / OPE)
    runs-on: ubuntu-latest
    needs: [lint, test-app, typecheck-app]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: npm ci
        working-directory: ./app
        run: npm ci
      - name: Build
        working-directory: ./app
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_FIREBASE_API_KEY: ${{ secrets.OPE_VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.OPE_VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.OPE_VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.OPE_VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.OPE_VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.OPE_VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.OPE_VITE_FIREBASE_VAPID_KEY }}
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-prod
          path: app/dist
          retention-days: 7

  build-functions:
    name: build · functions
    runs-on: ubuntu-latest
    needs: [test-functions, typecheck-functions]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FUNCTIONS_NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/functions/package-lock.json
      - name: npm ci
        working-directory: ./app/functions
        run: npm ci
      - name: Build
        working-directory: ./app/functions
        run: npm run build
      - name: Upload built lib + package
        uses: actions/upload-artifact@v4
        with:
          name: functions-build
          # We ship package.json + package-lock + lib so deploys can `npm
          # ci --only=prod` and use the compiled output.
          path: |
            app/functions/lib
            app/functions/package.json
            app/functions/package-lock.json
          retention-days: 7

  # ==========================================================================
  # STAGE 4 — deploy DEV (manual via environment gates)
  # Enabled on main + develop only. Each deploy has its own environment —
  # approve the one you want, skip the others.
  # ==========================================================================

  deploy-dev-frontend:
    name: deploy · dev frontend (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build-frontend-dev
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: dev-frontend
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dev
          path: dist
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload GH Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy
        id: pages
        uses: actions/deploy-pages@v4

  deploy-dev-functions:
    name: deploy · dev Firebase Functions
    runs-on: ubuntu-latest
    needs: build-functions
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: dev-functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FUNCTIONS_NODE_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: functions-build
          path: app/functions
      - name: Install functions prod deps
        working-directory: ./app/functions
        run: npm ci --omit=dev
      - name: Write service account
        run: |
          SA="$RUNNER_TEMP/firebase-sa.json"
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$SA"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA" >> "$GITHUB_ENV"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Deploy
        working-directory: ./app
        run: |
          npx firebase-tools deploy --only functions \
            --non-interactive --force --project "$PROJECT_ID"
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      - name: Scrub credentials
        if: always()
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS" || true

  deploy-dev-rules:
    name: deploy · dev Firestore + Storage rules
    runs-on: ubuntu-latest
    needs: install
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: dev-rules
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FUNCTIONS_NODE_VERSION }}
      - name: Write service account
        run: |
          SA="$RUNNER_TEMP/firebase-sa.json"
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$SA"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA" >> "$GITHUB_ENV"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Deploy rules
        working-directory: ./app
        run: |
          npx firebase-tools deploy --only firestore:rules,storage \
            --non-interactive --force --project "$PROJECT_ID"
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      - name: Scrub credentials
        if: always()
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS" || true

  # ==========================================================================
  # STAGE 5 — deploy PROD / OPE (manual, main only)
  # Same pattern, uses OPE_* secrets. prod-frontend additionally handles the
  # version tag (preflight check + create + push on success).
  # ==========================================================================

  deploy-prod-frontend:
    name: deploy · prod frontend (Netlify)
    runs-on: ubuntu-latest
    needs: build-frontend-prod
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod-frontend
      url: ${{ steps.netlify.outputs.deploy-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the tag preflight can see every existing tag.
          fetch-depth: 0
      - name: Read version from app/package.json
        id: ver
        run: |
          V=$(node -p "require('./app/package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Releasing v$V"
      - name: Preflight — tag must not exist at a different commit
        run: |
          git fetch --tags --force
          TAG="${{ steps.ver.outputs.tag }}"
          EXISTING=$(git rev-list -n 1 "$TAG" 2>/dev/null || true)
          if [ -z "$EXISTING" ]; then exit 0; fi
          if [ "$EXISTING" = "${{ github.sha }}" ]; then
            echo "Tag $TAG already at HEAD — treating as redeploy."
            exit 0
          fi
          echo "::error::Tag $TAG points at $EXISTING but deploy is ${{ github.sha }}. Bump app/package.json version."
          exit 1
      - uses: actions/download-artifact@v4
        with:
          name: frontend-prod
          path: app/dist
      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: app/dist
          production-deploy: true
          deploy-message: "Deploy ${{ steps.ver.outputs.tag }} (${{ github.sha }})"
          enable-pull-request-comment: false
          enable-commit-comment: false
          github-deployment-environment: production
          fails-without-credentials: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      - name: Create + push version tag
        if: success()
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          EXISTING=$(git rev-list -n 1 "$TAG" 2>/dev/null || true)
          if [ "$EXISTING" = "${{ github.sha }}" ]; then
            echo "Tag $TAG already at HEAD — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Deploy $TAG to Netlify — ${{ github.sha }}"
          git push origin "$TAG"

  deploy-prod-functions:
    name: deploy · prod Firebase Functions
    runs-on: ubuntu-latest
    needs: build-functions
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod-functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FUNCTIONS_NODE_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: functions-build
          path: app/functions
      - name: Install functions prod deps
        working-directory: ./app/functions
        run: npm ci --omit=dev
      - name: Write service account
        run: |
          SA="$RUNNER_TEMP/firebase-sa.json"
          echo "$OPE_FIREBASE_SERVICE_ACCOUNT" > "$SA"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA" >> "$GITHUB_ENV"
        env:
          OPE_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.OPE_FIREBASE_SERVICE_ACCOUNT }}
      - name: Deploy
        working-directory: ./app
        run: |
          npx firebase-tools deploy --only functions \
            --non-interactive --force --project "$PROJECT_ID"
        env:
          PROJECT_ID: ${{ secrets.OPE_FIREBASE_PROJECT_ID }}
      - name: Scrub credentials
        if: always()
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS" || true

  deploy-prod-rules:
    name: deploy · prod Firestore + Storage rules
    runs-on: ubuntu-latest
    needs: install
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod-rules
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FUNCTIONS_NODE_VERSION }}
      - name: Write service account
        run: |
          SA="$RUNNER_TEMP/firebase-sa.json"
          echo "$OPE_FIREBASE_SERVICE_ACCOUNT" > "$SA"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA" >> "$GITHUB_ENV"
        env:
          OPE_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.OPE_FIREBASE_SERVICE_ACCOUNT }}
      - name: Deploy rules
        working-directory: ./app
        run: |
          npx firebase-tools deploy --only firestore:rules,storage \
            --non-interactive --force --project "$PROJECT_ID"
        env:
          PROJECT_ID: ${{ secrets.OPE_FIREBASE_PROJECT_ID }}
      - name: Scrub credentials
        if: always()
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS" || true
