name: Validate (build · lint · test)

# Runs automatically on every push + PR on any branch. Solo-dev mode — we
# don't filter by branch; every commit is fair game for lint + test + build.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        # Placeholder — `lint` currently aliases `tsc --noEmit`.
        # Swap the package.json script to real ESLint when ready; this step
        # stays unchanged.
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build (smoke)
        # Builds without publishing — catches Vite config + env issues before
        # anyone triggers the real deploy workflows.
        run: npm run build
        env:
          VITE_BASE_PATH: /clever-house/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
