<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PWA Install Test — Chytrý dům na vsi</title>
    <meta name="theme-color" content="#5E5D3F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chytrý dům" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="icon" href="/icon-192.svg" />
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #F9F7F3;
        color: #25231E;
        padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1A1914; color: #F0EDE6; }
      }
      main {
        max-width: 360px;
        text-align: center;
      }
      h1 {
        font-size: 28px;
        font-weight: 600;
        margin: 0 0 8px;
        color: #5E5D3F;
      }
      p { font-size: 16px; line-height: 1.5; margin: 16px 0; }
      .badge {
        display: inline-block;
        background: #5E5D3F;
        color: #F9F7F3;
        padding: 6px 12px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.025em;
        text-transform: uppercase;
      }
      code {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.05);
        padding: 2px 6px;
        border-radius: 4px;
      }
      @media (prefers-color-scheme: dark) {
        code { background: rgba(255, 255, 255, 0.08); }
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">PWA test</span>
      <h1>PWA install test — works!</h1>
      <p id="mode">Načítá se…</p>
      <p id="ts"></p>
      <p><code>start_url</code>: <code id="url"></code></p>
      <p><code>display-mode</code>: <code id="display"></code></p>
    </main>
    <script>
      // Detect standalone
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;
      document.getElementById("mode").textContent = isStandalone
        ? "✅ Běžíš ve standalone módu (z home-screen ikony)."
        : "ℹ️ Běžíš v prohlížeči. Přidej na plochu přes Share menu.";
      document.getElementById("ts").textContent =
        "Čas načtení: " + new Date().toLocaleString("cs-CZ");
      document.getElementById("url").textContent = window.location.pathname;
      document.getElementById("display").textContent = isStandalone
        ? "standalone"
        : "browser";

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(console.error);
      }
    </script>
  </body>
</html>
